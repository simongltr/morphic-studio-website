<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body { background: #e9e7e2; }

      /* Exact Open Graph canvas. */
      .og {
        width: 1200px;
        height: 630px;
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(
            120% 120% at 85% 12%,
            rgba(0, 0, 0, 0.06) 0%,
            rgba(0, 0, 0, 0) 55%
          ),
          #fafaf8;
        color: rgba(0, 0, 0, 0.92);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 72px 80px;
        font-family: "Inter", system-ui, sans-serif;
      }

      /* Subtle hairline frame, echoing the site's bordered cards. */
      .og::after {
        content: "";
        position: absolute;
        inset: 28px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 14px;
        pointer-events: none;
      }

      /* ---- Top: wordmark ---- */
      .brand {
        display: flex;
        align-items: center;
        gap: 18px;
        position: relative;
        z-index: 1;
      }
      .brand svg {
        height: 40px;
        width: auto;
        display: block;
      }
      .brand svg path { fill: rgba(0, 0, 0, 0.92); }
      .brand__name {
        font-family: "Quicksand", system-ui, sans-serif;
        font-weight: 600;
        font-size: 22px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(0, 0, 0, 0.92);
      }

      /* ---- Center: headline ---- */
      .headline {
        position: relative;
        z-index: 1;
        max-width: 980px;
      }
      .headline h1 {
        font-family: "Libre Baskerville", Georgia, serif;
        font-weight: 700;
        font-size: 60px;
        line-height: 1.18;
        letter-spacing: -0.01em;
        color: rgba(0, 0, 0, 0.92);
      }
      .headline .accent { font-style: italic; font-weight: 400; }

      /* ---- Bottom: meta row ---- */
      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        z-index: 1;
      }
      .meta__tag {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 17px;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: rgba(0, 0, 0, 0.62);
      }
      .meta__url {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 17px;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: rgba(0, 0, 0, 0.62);
      }
    </style>
  </head>
  <body>

        <h1>

</html>
