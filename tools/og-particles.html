<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>OG — particules morphiques</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #d9d6d0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        padding: 40px;
        font-family: "Inter", system-ui, sans-serif;
      }

      /* ---------- The OG card (1200×630) ---------- */
      .og {
        width: 1200px;
        height: 630px;
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(120% 120% at 85% 12%, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 55%),
          #fafaf8;
        color: rgba(0, 0, 0, 0.92);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 72px 80px;
        flex: none;
        --halo: 12px;
      }
      .og::after {
        content: "";
        position: absolute; inset: 28px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 14px; pointer-events: none; z-index: 3;
      }
      #field {
        position: absolute; inset: 0; z-index: 0; pointer-events: none;
        width: 1200px; height: 630px;
      }

      /* Halo of the page colour behind every text/logo element, so the
         particle pattern never blurs the type when it overlaps. */
      .brand { display: flex; align-items: center; gap: 18px; position: relative; z-index: 2; }
      .brand svg {
        height: 40px; width: auto; display: block;
      }
      .brand svg path { fill: rgba(0, 0, 0, 0.92); }
      .brand__name {
        font-family: "Quicksand", system-ui, sans-serif;
        font-weight: 600; font-size: 22px; letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      .headline { position: relative; z-index: 2; max-width: 980px; }
      .headline h1 {
        font-family: "Libre Baskerville", Georgia, serif;
        font-weight: 700; font-size: 60px; line-height: 1.18;
        letter-spacing: -0.01em;
        text-shadow: 0 0 var(--halo) #fafaf8, 0 0 var(--halo) #fafaf8,
                     0 0 var(--halo) #fafaf8, 0 0 calc(var(--halo) * 2.2) #fafaf8;
      }
      .headline .accent { font-style: italic; font-weight: 400; }
      .meta {
        display: flex; align-items: center; justify-content: space-between;
        position: relative; z-index: 2;
      }
      .meta__tag, .meta__url {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 17px; font-weight: 500; color: rgba(0, 0, 0, 0.62);
        text-shadow: 0 0 var(--halo) #fafaf8, 0 0 var(--halo) #fafaf8,
                     0 0 var(--halo) #fafaf8, 0 0 var(--halo) #fafaf8,
                     0 0 calc(var(--halo) * 2) #fafaf8;
      }

      /* ---------- Control panel ---------- */
      .panel {
        width: 1200px;
        background: #1b1b1a; color: #e8e6e1;
        border-radius: 12px; padding: 18px 22px;
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px 28px;
        font-size: 13px;
      }
      .panel h2 {
        grid-column: 1 / -1; font-size: 13px; font-weight: 600;
        letter-spacing: 0.04em; text-transform: uppercase; color: #9d9a93;
        display: flex; justify-content: space-between; align-items: center;
      }
      .ctrl { display: flex; flex-direction: column; gap: 5px; }
      .ctrl label { display: flex; justify-content: space-between; color: #b9b6af; }
      .ctrl label b { color: #fff; font-variant-numeric: tabular-nums; }
      .ctrl input[type="range"] { width: 100%; accent-color: #fff; }
      .panel button {
        background: #fff; color: #111; border: 0; border-radius: 7px;
        padding: 7px 12px; font: inherit; font-weight: 600; cursor: pointer;
      }
      .panel button.ghost { background: transparent; color: #e8e6e1; border: 1px solid #444; }
    </style>
  </head>
  <body>
    <div class="og" id="card">
      <canvas id="field"></canvas>
      <div class="brand">
        <svg viewBox="0 0 55.139378 60.577862" aria-hidden="true">
          <g transform="translate(-61.628656,-87.159944)">
            <g transform="matrix(0.55139349,0,0,-0.55139349,61.628655,147.7378)">
              <path d="m 54.456193,80.053008 c -1.311365,-1.048401 -1.924234,-2.373925 -1.956228,-3.966767 l 1.7e-5,-19.770276 c 0.08228,-4.190893 4.660656,-6.45651 8.043793,-3.966732 L 98.043789,81.12396 c 1.311397,1.048427 1.924246,2.374012 1.956241,3.966767 l -2e-5,19.770273 c -0.0822,4.18641 -4.654176,6.45832 -8.043796,3.96659 z" />
              <path d="m 47.5,76.086241 c -0.03237,1.611343 -0.658915,2.929495 -1.95621,3.966767 L 8.0438071,108.82777 c -2.7651664,2.0358 -7.6715903,0.99864 -8.03985997,-3.76813 L 0,85.090727 C 0.03278342,83.445156 0.6860305,82.139419 1.9561929,81.12396 L 39.456193,52.349198 c 3.380894,-2.489106 7.961477,-0.225833 8.043779,3.966731 z" />
              <path d="m 53.043807,41.594246 c -1.884708,-1.387677 -4.202823,-1.387738 -6.087614,0 L 8.0438071,71.45277 C 4.6644698,73.940724 0.08336455,71.681233 0,67.486003 V 47.715727 C 0.03278342,46.070156 0.6860305,44.764419 1.9561929,43.74896 L 46.956193,9.219246 c 1.884737,-1.3877044 4.202825,-1.3877428 6.087614,0 l 45,34.529714 c 1.311397,1.048427 1.924246,2.374012 1.956243,3.966767 l -3e-5,19.770276 c -0.08228,4.190921 -4.660693,6.4565 -8.043788,3.966731 z" />
              <path d="M 76.956193,22.567865 C 75.696759,21.560981 75.032946,20.260009 75,18.601098 V 5 c 0.05639,-2.8381818 2.17028,-4.94443139 5,-5 h 15 c 2.833155,0.05563606 4.944285,2.1659054 5,5 v 25.111003 c -0.08228,4.190921 -4.660698,6.4565 -8.043793,3.966731 z" />
              <path d="M 8.0438071,34.07777 C 4.6644698,36.565724 0.08336455,34.306233 0,30.111003 V 5 C 0.05564821,2.1662249 2.1666028,0.05564079 5,0 h 15 c 2.83438,0.05566012 4.944458,2.167333 5,5 v 13.601098 c -0.03236,1.611281 -0.658889,2.929442 -1.956216,3.966767 z" />
            </g>
          </g>
        </svg>
        <span class="brand__name">Morphic Studio</span>
      </div>
      <div class="headline">
        <h1>Création de sites et d'applications <span class="accent">web</span></h1>
      </div>
      <div class="meta">
        <span class="meta__tag">Studio web · Angers &amp; partout en France</span>
        <span class="meta__url">morphicstudio.fr</span>
      </div>
    </div>

    <div class="panel">
      <h2>
        <span>Champ de particules — réglages</span>
        <span style="display:flex; align-items:center; gap:10px;">
          <label style="display:flex; align-items:center; gap:6px; text-transform:none; letter-spacing:0; color:#b9b6af;">
            seed <input id="seed" type="number" style="width:120px; background:#111; color:#fff; border:1px solid #444; border-radius:6px; padding:5px 8px; font:inherit;">
          </label>
          <button id="regen">Nouvelle graine</button>
          <button class="ghost" id="toggleText">Masquer le texte</button>
        </span>
      </h2>
      <div class="ctrl"><label>Position X de la forme <b id="vCx"></b></label><input id="cx" type="range" min="0" max="1200" step="10"></div>
      <div class="ctrl"><label>Position Y de la forme <b id="vCy"></b></label><input id="cy" type="range" min="0" max="630" step="10"></div>
      <div class="ctrl"><label>Taille de la forme <b id="vSize"></b></label><input id="size" type="range" min="40" max="600" step="5"></div>
      <div class="ctrl"><label>Netteté du contour (γ) <b id="vGamma"></b></label><input id="gamma" type="range" min="0.4" max="10" step="0.1"></div>
      <div class="ctrl"><label>Densité (nb particules) <b id="vCount"></b></label><input id="count" type="range" min="50000" max="10000000" step="50000"></div>
      <div class="ctrl"><label>Encre (opacité) <b id="vInk"></b></label><input id="ink" type="range" min="0.05" max="2" step="0.05"></div>
      <div class="ctrl"><label>Finesse particule (px) <b id="vDot"></b></label><input id="dot" type="range" min="0.3" max="3" step="0.1"></div>
      <div class="ctrl"><label>Organique (déformation) <b id="vWarp"></b></label><input id="warp" type="range" min="0" max="300" step="5"></div>
      <div class="ctrl"><label>Agglomération (paquets) <b id="vClump"></b></label><input id="clump" type="range" min="0" max="1" step="0.05"></div>
      <div class="ctrl"><label>Fils / toile — intensité <b id="vThreads"></b></label><input id="threads" type="range" min="0" max="1" step="0.05"></div>
      <div class="ctrl"><label>Finesse des fils <b id="vThick"></b></label><input id="thick" type="range" min="0.02" max="0.5" step="0.01"></div>
      <div class="ctrl"><label>Échelle de la toile (px) <b id="vWeb"></b></label><input id="web" type="range" min="30" max="260" step="5"></div>
      <div class="ctrl"><label>Grain de fond (film) <b id="vGrain"></b></label><input id="grain" type="range" min="0" max="0.15" step="0.005"></div>
      <div class="ctrl"><label>Halo texte (ombre fond) <b id="vHalo"></b></label><input id="halo" type="range" min="0" max="40" step="1"></div>
    </div>

    <script>
      // ---------- seeded RNG (mulberry32) ----------
      function mulberry32(a) {
        return function () {
          a |= 0; a = (a + 0x6d2b79f5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      // ---------- value-noise + fbm (organic field) ----------
      function makeNoise(seed) {
        const rng = mulberry32(seed);
        const perm = new Uint8Array(512);
        const p = [...Array(256).keys()];
        for (let i = 255; i > 0; i--) {
          const j = Math.floor(rng() * (i + 1));
          [p[i], p[j]] = [p[j], p[i]];
        }
        for (let i = 0; i < 512; i++) perm[i] = p[i & 255];
        const fade = (t) => t * t * t * (t * (t * 6 - 15) + 10);
        const lerp = (a, b, t) => a + (b - a) * t;
        function noise(x, y) {
          const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255;
          const xf = x - Math.floor(x), yf = y - Math.floor(y);
          const tl = perm[perm[xi] + yi], tr = perm[perm[xi + 1] + yi];
          const bl = perm[perm[xi] + yi + 1], br = perm[perm[xi + 1] + yi + 1];
          const u = fade(xf), v = fade(yf);
          const top = lerp(tl, tr, u), bot = lerp(bl, br, u);
          return lerp(top, bot, v) / 255; // 0..1
        }
        function fbm(x, y, oct = 4) {
          let amp = 0.5, freq = 1, sum = 0, norm = 0;
          for (let i = 0; i < oct; i++) {
            sum += amp * noise(x * freq, y * freq);
            norm += amp; amp *= 0.5; freq *= 2;
          }
          return sum / norm; // 0..1
        }
        return { fbm };
      }

      // ---------- state ----------
      const P = {
        seed: 1337, cx: 860, cy: 312, size: 210, gamma: 2.0,
        count: 1200000, ink: 0.5, dot: 0.45, warp: 60, clump: 0.4, grain: 0.015,
        threads: 0.75, thick: 0.14, web: 110, halo: 12,
      };

      const canvas = document.getElementById("field");
      const ctx = canvas.getContext("2d");
      const W = 1200, H = 630, DPR = 2;
      const WD = W * DPR, HD = H * DPR;
      canvas.width = WD; canvas.height = HD;

      // Organic blob = several gaussian centres around (cx,cy), domain-warped.
      function buildCentres() {
        const r = mulberry32(P.seed ^ 0x9e37);
        const n = 5;
        const c = [];
        for (let i = 0; i < n; i++) {
          const ang = r() * Math.PI * 2;
          const rad = r() * P.size * 0.7;
          c.push({
            x: P.cx + Math.cos(ang) * rad,
            y: P.cy + Math.sin(ang) * rad * 0.7,
            s: P.size * (0.45 + r() * 0.6),
          });
        }
        return c;
      }

      // Worley / cellular noise → returns F2 − F1, which is ~0 along the
      // boundaries between cells. Those zero-lines form a connected network of
      // filaments (a web). Seeded, deterministic integer hash for the germs.
      function hash2(ix, iy, seed) {
        let h = (ix * 374761393 + iy * 668265263 + seed * 362437) | 0;
        h = Math.imul(h ^ (h >>> 13), 1274126177);
        const a = ((h ^ (h >>> 16)) >>> 0) / 4294967296;
        let g = (ix * 1274126177 + iy * 374761393 + seed * 668265263) | 0;
        g = Math.imul(g ^ (g >>> 15), 2246822519);
        const b = ((g ^ (g >>> 13)) >>> 0) / 4294967296;
        return [a, b];
      }
      function worleyEdge(x, y, scale, seed) {
        const gx = x / scale, gy = y / scale;
        const ix = Math.floor(gx), iy = Math.floor(gy);
        let f1 = 1e9, f2 = 1e9;
        for (let oy = -1; oy <= 1; oy++)
          for (let ox = -1; ox <= 1; ox++) {
            const [jx, jy] = hash2(ix + ox, iy + oy, seed);
            const dx = ix + ox + jx - gx, dy = iy + oy + jy - gy;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < f1) { f2 = f1; f1 = d; } else if (d < f2) { f2 = d; }
          }
        return f2 - f1; // 0 on the web lines, larger inside cells
      }

      // Pre-compute the density field on a grid (CSS-px space); particles read
      // it via bilinear interpolation — keeps noise calls ~constant no matter
      // how many particles we splat. Fine grid so thin filaments survive.
      const GW = 640, GH = 336;
      const grid = new Float32Array(GW * GH);
      function buildGrid() {
        const noise = makeNoise(P.seed);
        const centres = buildCentres();
        for (let gy = 0; gy < GH; gy++) {
          for (let gx = 0; gx < GW; gx++) {
            const x = (gx / (GW - 1)) * W;
            const y = (gy / (GH - 1)) * H;
            // organic domain warp (shared by form + web → coherent motion)
            const wx = x + P.warp * (noise.fbm(x * 0.004 + 7.3, y * 0.004) - 0.5);
            const wy = y + P.warp * (noise.fbm(x * 0.004, y * 0.004 + 3.1) - 0.5);
            // organic silhouette (where the mass lives)
            let m = 0;
            for (const c of centres) {
              const dx = wx - c.x, dy = wy - c.y;
              m += Math.exp(-(dx * dx + dy * dy) / (2 * c.s * c.s));
            }
            m = 1 - Math.exp(-m);
            // web of filaments (ridges along Worley cell boundaries)
            const edge = worleyEdge(wx, wy, P.web, P.seed);
            const fil = Math.max(0, 1 - edge / P.thick); // 1 on lines → 0 off
            // blend solid blob ↔ filament network
            const struct = (1 - P.threads) + P.threads * fil;
            // internal clumping
            const cl = 1 - P.clump + P.clump * noise.fbm(wx * 0.014, wy * 0.014, 4);
            grid[gy * GW + gx] = Math.min(1, m * struct * cl);
          }
        }
      }
      function sampleDensity(x, y) {
        const fx = (x / W) * (GW - 1), fy = (y / H) * (GH - 1);
        const x0 = fx | 0, y0 = fy | 0;
        const x1 = Math.min(x0 + 1, GW - 1), y1 = Math.min(y0 + 1, GH - 1);
        const tx = fx - x0, ty = fy - y0;
        const a = grid[y0 * GW + x0], b = grid[y0 * GW + x1];
        const c = grid[y1 * GW + x0], d = grid[y1 * GW + x1];
        return (a * (1 - tx) + b * tx) * (1 - ty) + (c * (1 - tx) + d * tx) * ty;
      }

      function render() {
        buildGrid();
        const rng = mulberry32(P.seed ^ 0xabcd);
        // Accumulation buffer (ink deposited per device pixel).
        const acc = new Float32Array(WD * HD);

        const deposit = (px, py, amt) => {
          const ix = px | 0, iy = py | 0;
          if (ix < 0 || iy < 0 || ix >= WD || iy >= HD) return;
          acc[iy * WD + ix] += amt;
        };

        // Importance sampling: dense in the form, sparse drift outside.
        const rDev = P.dot * DPR; // particle footprint in device px
        for (let i = 0; i < P.count; i++) {
          const x = rng() * W, y = rng() * H;
          const d = sampleDensity(x, y);
          if (rng() < Math.pow(d, P.gamma)) {
            const amt = P.ink * (0.25 + 0.75 * d);
            const px = x * DPR, py = y * DPR;
            if (rDev <= 0.8) {
              deposit(px, py, amt); // single fine pixel
            } else {
              // tiny gaussian splat for larger particle sizes
              const R = Math.ceil(rDev);
              for (let oy = -R; oy <= R; oy++)
                for (let ox = -R; ox <= R; ox++) {
                  const w = Math.exp(-(ox * ox + oy * oy) / (2 * rDev * rDev));
                  if (w > 0.05) deposit(px + ox, py + oy, amt * w);
                }
            }
          }
        }

        // Film grain: faint uniform speckle across the whole card.
        if (P.grain > 0) {
          const gN = (WD * HD) * 0.12;
          for (let i = 0; i < gN; i++) {
            deposit(rng() * WD, rng() * HD, P.grain * (0.4 + rng() * 0.6));
          }
        }

        // Composite accumulation → black pixels with saturating alpha.
        const img = ctx.createImageData(WD, HD);
        const data = img.data;
        for (let i = 0; i < acc.length; i++) {
          const a = 1 - Math.exp(-acc[i] * 2.2); // saturate, avoid clipping
          const j = i * 4;
          data[j] = 0; data[j + 1] = 0; data[j + 2] = 0;
          data[j + 3] = (a * 255) | 0;
        }
        ctx.putImageData(img, 0, 0);
      }

      // ---------- wire up controls ----------
      const bind = (id, key, fmt = (v) => v) => {
        const el = document.getElementById(id);
        const out = document.getElementById("v" + id[0].toUpperCase() + id.slice(1));
        el.value = P[key];
        if (out) out.textContent = fmt(P[key]);
        el.addEventListener("input", () => {
          P[key] = parseFloat(el.value);
          if (out) out.textContent = fmt(P[key]);
          render();
        });
      };
      bind("cx", "cx", Math.round);
      bind("cy", "cy", Math.round);
      bind("size", "size", Math.round);
      bind("gamma", "gamma", (v) => v.toFixed(1));
      bind("count", "count", (v) => v >= 1e6 ? (v / 1e6).toFixed(2) + "M" : (v / 1000).toFixed(0) + "k");
      bind("ink", "ink", (v) => v.toFixed(2));
      bind("dot", "dot", (v) => v.toFixed(1));
      bind("warp", "warp", Math.round);
      bind("clump", "clump", (v) => v.toFixed(2));
      bind("threads", "threads", (v) => v.toFixed(2));
      bind("thick", "thick", (v) => v.toFixed(2));
      bind("web", "web", Math.round);
      bind("grain", "grain", (v) => v.toFixed(3));

      // Halo only touches a CSS variable → no field recompute needed.
      const card = document.getElementById("card");
      const haloEl = document.getElementById("halo");
      const haloOut = document.getElementById("vHalo");
      const setHalo = () => {
        card.style.setProperty("--halo", P.halo + "px");
        haloOut.textContent = P.halo + "px";
      };
      haloEl.value = P.halo;
      haloEl.addEventListener("input", () => {
        P.halo = parseFloat(haloEl.value);
        setHalo();
      });
      setHalo();

      const seedInput = document.getElementById("seed");
      seedInput.value = P.seed;
      seedInput.addEventListener("input", () => {
        P.seed = parseInt(seedInput.value || "0", 10) | 0;
        render();
      });
      document.getElementById("regen").addEventListener("click", () => {
        P.seed = (Math.random() * 1e9) | 0;
        seedInput.value = P.seed;
        render();
      });
      document.getElementById("toggleText").addEventListener("click", (e) => {
        const card = document.getElementById("card");
        const hidden = card.classList.toggle("text-hidden");
        for (const el of card.querySelectorAll(".brand, .headline, .meta"))
          el.style.visibility = hidden ? "hidden" : "visible";
        e.target.textContent = hidden ? "Afficher le texte" : "Masquer le texte";
      });

      document.fonts.ready.then(render);
      render();
    </script>
  </body>
</html>
