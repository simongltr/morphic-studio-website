<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Morphic Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: "Libre Baskerville", Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 640px;
      overflow: hidden;
      background-image: url("hero-background.webp");
      background-size: cover;
      background-position: center;
    }

    .hero__title {
      position: absolute;
      left: 50%;
      top: 22%;
      transform: translate(-50%, -50%);
      margin: 0;
      width: min(1100px, 92vw);
      text-align: center;
      font-family: "Libre Baskerville", Georgia, serif;
      font-weight: 400;
      font-size: clamp(2rem, 4.6vw, 4.25rem);
      line-height: 1.18;
      letter-spacing: -0.01em;
      color: #fff;
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.45);
    }

    .hero__couple {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      height: 55%;
      width: auto;
      max-width: 90vw;
      object-fit: contain;
      object-position: bottom center;
      mix-blend-mode: multiply;
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 640px) {
      .hero__title { top: 22%; }
      .hero__couple { height: 50%; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1 class="hero__title">We craft digital<br>experiences that last</h1>
    <img class="hero__couple" src="hero-couple.webp" alt="">
  </section>
</body>
</html>
