<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Morphic Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: "Libre Baskerville", Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 640px;
      overflow: hidden;
      background-image: url("hero-background.webp");
      background-size: cover;
      background-position: center;
      --title-x: 0px;
      --title-y: 0px;
      --couple-x: 0px;
      --couple-y: 0px;
    }

    .hero__title {
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(calc(-50% + var(--title-x)), calc(-50% + var(--title-y)));
      margin: 0;
      width: min(1100px, 92vw);
      text-align: center;
      font-family: "Libre Baskerville", Georgia, serif;
      font-weight: 700;
      font-size: clamp(2rem, 4.6vw, 4.25rem);
      line-height: 1.18;
      letter-spacing: -0.01em;
      color: rgba(0, 0, 0, 0.8);
      will-change: transform;
    }

    .hero__couple {
      position: absolute;
      left: 50%;
      bottom: -8%;
      transform: translate(calc(-50% + var(--couple-x)), var(--couple-y));
      height: 55%;
      width: auto;
      max-width: 90vw;
      object-fit: contain;
      object-position: bottom center;
      pointer-events: none;
      user-select: none;
      will-change: transform;
    }

    @media (max-width: 640px) {
      .hero__title { top: 45%; }
      .hero__couple { height: 50%; bottom: -6%; }
    }

  </style>
</head>
<body>
  <section class="hero" id="hero">
    <h1 class="hero__title">We craft digital<br>experiences that last</h1>
    <img class="hero__couple" src="hero-couple.webp" alt="">
  </section>

  <script>
    (function () {
      const hero = document.getElementById("hero");
      if (!hero) return;
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      if (window.matchMedia("(hover: none)").matches) return;

      // Subtle parallax: couple moves more than the title to suggest depth.
      const TITLE_MAX_X = 6;
      const TITLE_MAX_Y = 4;
      const COUPLE_MAX_X = 14;
      const COUPLE_MAX_Y = 8;

      let targetX = 0;
      let targetY = 0;
      let currentX = 0;
      let currentY = 0;
      let raf = null;

      function tick() {
        currentX += (targetX - currentX) * 0.08;
        currentY += (targetY - currentY) * 0.08;
        hero.style.setProperty("--title-x", (currentX * TITLE_MAX_X).toFixed(2) + "px");
        hero.style.setProperty("--title-y", (currentY * TITLE_MAX_Y).toFixed(2) + "px");
        hero.style.setProperty("--couple-x", (currentX * COUPLE_MAX_X).toFixed(2) + "px");
        hero.style.setProperty("--couple-y", (currentY * COUPLE_MAX_Y).toFixed(2) + "px");
        if (Math.abs(targetX - currentX) > 0.001 || Math.abs(targetY - currentY) > 0.001) {
          raf = requestAnimationFrame(tick);
        } else {
          raf = null;
        }
      }

      function onMove(e) {
        const rect = hero.getBoundingClientRect();
        const nx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        const ny = ((e.clientY - rect.top) / rect.height) * 2 - 1;
        targetX = Math.max(-1, Math.min(1, nx));
        targetY = Math.max(-1, Math.min(1, ny));
        if (!raf) raf = requestAnimationFrame(tick);
      }

      function onLeave() {
        targetX = 0;
        targetY = 0;
        if (!raf) raf = requestAnimationFrame(tick);
      }

      hero.addEventListener("mousemove", onMove);
      hero.addEventListener("mouseleave", onLeave);
    })();
  </script>
</body>
</html>
